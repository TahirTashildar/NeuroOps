<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroOps 3D Premium — Causal AI Observability</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Poppins:wght@600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/three@r128/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@r128/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <style>
        :root {
            --bg: #050a1f;
            --bg2: #0a0f2e;
            --glass: rgba(15, 20, 55, 0.6);
            --txt: #f0f4ff;
            --txt-dim: #a0aeff;
            --bdr: #2a3f7f;
            --acc-blue: #64b5f6;
            --acc-purple: #b39ddb;
            --acc-green: #81c784;
            --acc-cyan: #00d4ff;
            --red: #ff4757;
            --grn: #2ed573;
            --yel: #ffa502;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #0a1540 100%);
            color: var(--txt);
            overflow: hidden;
            font-size: 16px;
        }
        
        body {
            display: flex;
            flex-direction: column;
            position: fixed;
        }
        
        /* ─── HEADER ─── */
        #header {
            height: 100px;
            background: linear-gradient(180deg, rgba(10, 15, 30, 0.95) 0%, rgba(10, 15, 30, 0.7) 100%);
            border-bottom: 1px solid var(--bdr);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            flex-shrink: 0;
            z-index: 100;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }
        
        #header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(600px at 50% 50%, rgba(100, 181, 246, 0.08) 0%, transparent 100%);
            pointer-events: none;
        }
        
        #logo {
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 2;
        }
        
        .logo-icon {
            font-size: 48px;
            filter: drop-shadow(0 0 20px rgba(100, 181, 246, 0.5));
            animation: float 3s ease-in-out infinite;
        }
        
        .logo-text {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .logo-name {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.02em;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(90deg, var(--acc-blue) 0%, var(--acc-cyan) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .logo-sub {
            font-size: 11px;
            color: var(--txt-dim);
            letter-spacing: 0.12em;
            font-weight: 600;
        }
        
        #stats {
            display: flex;
            gap: 32px;
            align-items: center;
            z-index: 2;
        }
        
        .stat-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--txt-dim);
            letter-spacing: 0.1em;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(90deg, var(--acc-blue), var(--acc-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(46, 213, 115, 0.1);
            border: 1px solid var(--grn);
            border-radius: 8px;
            animation: pulse 2s infinite;
        }
        
        .live-dot {
            width: 8px;
            height: 8px;
            background: var(--grn);
            border-radius: 50%;
            animation: pulse-dot 2s infinite;
        }
        
        .live-text {
            font-size: 13px;
            font-weight: 700;
            color: var(--grn);
            letter-spacing: 0.08em;
        }
        
        /* ─── CANVAS ─── */
        #canvas-container {
            width: 100%;
            height: calc(100% - 100px);
            position: relative;
            background: linear-gradient(180deg, #050a1f 0%, #0a1540 100%);
        }
        
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        
        /* ─── FLOATING UI PANELS ─── */
        .ui-panel {
            position: absolute;
            background: rgba(10, 15, 30, 0.8);
            border: 1px solid var(--bdr);
            border-radius: 16px;
            padding: 20px;
            backdrop-filter: blur(20px);
            z-index: 99;
            font-size: 14px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6), 
                        0 0 40px rgba(100, 181, 246, 0.1);
            animation: slideIn 0.6s ease-out;
        }
        
        #info-panel {
            bottom: 40px;
            left: 40px;
            width: 320px;
            max-height: 60vh;
            overflow-y: auto;
        }
        
        #control-panel {
            bottom: 40px;
            right: 40px;
            width: 280px;
        }
        
        .panel-title {
            font-size: 18px;
            font-weight: 800;
            font-family: 'Poppins', sans-serif;
            margin-bottom: 16px;
            background: linear-gradient(90deg, var(--acc-blue), var(--acc-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .panel-item {
            margin-bottom: 14px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--bdr);
        }
        
        .panel-item:last-child {
            margin-bottom: 0;
            border-bottom: none;
            padding-bottom: 0;
        }
        
        .item-label {
            font-size: 12px;
            color: var(--txt-dim);
            letter-spacing: 0.08em;
            font-weight: 600;
            margin-bottom: 6px;
        }
        
        .item-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--txt);
        }
        
        /* ─── BUTTONS ─── */
        .btn {
            width: 100%;
            padding: 12px 16px;
            margin-bottom: 10px;
            background: rgba(100, 181, 246, 0.1);
            border: 1px solid var(--acc-blue);
            border-radius: 8px;
            color: var(--acc-blue);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
        }
        
        .btn:hover {
            background: rgba(100, 181, 246, 0.25);
            box-shadow: 0 0 20px rgba(100, 181, 246, 0.3);
            transform: translateY(-2px);
        }
        
        .btn:last-child {
            margin-bottom: 0;
        }
        
        /* ─── TOOLTIP ─── */
        #tooltip {
            display: none;
            position: fixed;
            background: rgba(10, 15, 30, 0.95);
            border: 1px solid var(--acc-blue);
            border-radius: 12px;
            padding: 16px;
            font-size: 13px;
            max-width: 250px;
            backdrop-filter: blur(15px);
            z-index: 200;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            pointer-events: none;
        }
        
        .tooltip-name {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
            color: var(--acc-blue);
        }
        
        .tooltip-stat {
            font-size: 12px;
            color: var(--txt-dim);
            margin-bottom: 4px;
        }
        
        /* ─── ANIMATIONS ─── */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        
        @keyframes pulse-dot {
            0% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(46, 213, 115, 0); }
            100% { box-shadow: 0 0 0 0 rgba(46, 213, 115, 0); }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* ─── SCROLLBARS ─── */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(100, 181, 246, 0.05);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(100, 181, 246, 0.3);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(100, 181, 246, 0.5);
        }
    </style>
</head>
<body>
    <div id="header">
        <div id="logo">
            <div class="logo-icon">🧠</div>
            <div class="logo-text">
                <div class="logo-name">NEURO<span style="color: var(--acc-cyan);">OPS</span></div>
                <div class="logo-sub">Causal AI Observability · Premium 3D</div>
            </div>
        </div>
        
        <div id="stats">
            <div class="stat-group">
                <div class="stat-label">Services</div>
                <div class="stat-value" id="stat-services">11</div>
            </div>
            <div class="stat-group">
                <div class="stat-label">Health</div>
                <div class="stat-value" id="stat-health">98%</div>
            </div>
            <div class="stat-group">
                <div class="stat-label">Latency P95</div>
                <div class="stat-value" id="stat-latency">45ms</div>
            </div>
            <div class="live-indicator">
                <div class="live-dot"></div>
                <span class="live-text">LIVE</span>
            </div>
        </div>
    </div>
    
    <div id="canvas-container"></div>
    
    <div id="info-panel" class="ui-panel">
        <div class="panel-title">Service Details</div>
        <div id="info-service-name" class="item-value" style="margin-bottom: 20px; font-size: 20px;">Select a service</div>
        <div id="info-status"></div>
    </div>
    
    <div id="control-panel" class="ui-panel">
        <div class="panel-title">Controls</div>
        <button class="btn" onclick="window.resetView()">🔄 Reset View</button>
        <button class="btn" onclick="window.toggleDependencies()">🔗 Dependencies</button>
        <button class="btn" onclick="window.showParticles()">✨ Particles</button>
        <button class="btn" onclick="window.autoRotateToggle()">🌀 Auto-Rotate</button>
        <button class="btn" onclick="window.cycleCameraView()">📹 Camera Views</button>
        <button class="btn" onclick="window.triggerIncident()" style="background: rgba(255, 71, 87, 0.1); border-color: var(--red); color: var(--red);">⚠️ Trigger Incident</button>
    </div>
    
    <div id="tooltip"></div>
    
    <script src="app-3d-premium.js"></script>
</body>
</html>
